<!DOCTYPE html>
<html>

<head>
  <title>AI Study Assistant</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">
  <h1>AI Study Assistant</h1>

<textarea id="question" rows="6" cols="60" placeholder="Type your question here..."></textarea>

<br><br>

<div class="buttons">
  <button onclick="ask(true)">Ask AI (new chat)</button>
  <button onclick="ask(false)">Ask AI (continue)</button>
</div>

<h2>Answer:</h2>

<div id="answer"></div>

  <script src="script.js"></script>
</div>

</body>
</html>
